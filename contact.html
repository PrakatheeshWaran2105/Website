<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIWISeduTech Contact</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #f4f6f9;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 75px;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    z-index: 1000;
}

nav ul {
    display: flex;
    gap: 30px;
    list-style: none;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: 500;
}

nav ul li a:hover {
    color: #38bdf8;
}

/* MAIN WRAPPER */
.main {
    padding-top: 110px;
    display: flex;
    justify-content: center;
}

/* CARD */
.container {
    display: flex;
    width: 900px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* LEFT */
.left {
    flex: 1;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 40px;
}

.left h2 {
    margin-bottom: 20px;
}

.left p {
    margin: 12px 0;
    color: #cbd5e1;
}

/* RIGHT */
.right {
    flex: 1.2;
    padding: 40px;
}

.right h2 {
    margin-bottom: 20px;
    color: #0f172a;
}

/* FORM */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
}

input:focus, select:focus {
    border-color: #38bdf8;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #0ea5e9;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0284c7;
}

/* SUCCESS */
#successMsg {
    display: none;
    color: green;
    font-weight: 600;
    margin-bottom: 10px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .container {
        flex-direction: column;
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2 style="color:white;">KIWISeduTech</h2>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="prices.html">Prices</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="payment.html">Payment</a></li>
    </ul>
</nav>

<!-- MAIN -->
<div class="main">

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h2>Contact Info</h2>
        <p>📞 +91 1234567890</p>
        <p>📧 kiwisedutech@gmail.com</p>
        <p>📍 Chennai, Tamil Nadu</p>
        <p>🕒 Mon - Sat (9AM - 6PM)</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <h2>Apply Now</h2>

        <p id="successMsg">✅ Application submitted successfully!</p>

        <form id="contactForm">
            <input type="text" placeholder="Name" required>
            <input type="tel" placeholder="Mobile" required>
            <input type="email" placeholder="Email" required>

            <select required>
                <option disabled selected>Select Course</option>
                <option>AI</option>
                <option>IoT</option>
                <option>Full Stack</option>
                <option>Power BI & SQL</option>
                <option>Embedded</option>
            </select>

            <button type="submit">Submit</button>
        </form>

    </div>

</div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    let msg = document.getElementById("successMsg");
    msg.style.display = "block";

    this.reset();

    setTimeout(() => {
        msg.style.display = "none";
    }, 3000);
});
</script>

</body>
</html>
